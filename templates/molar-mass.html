{% extends "base.html" %}

{% block content %}
    <h1>{{title}}</h1>
    <p>
        Enter a chemical formula to calculate its molar mass:
    </p>
    <form method="post">
        <input type="text" name="formula" placeholder="e.g. H2O" required>
        <button type="submit">Calculate</button>
    </form>
    {% if molar_mass is not none %}
        <h2>Molar Mass: {{ molar_mass }} g/mol</h2>
    {% endif %}
{% endblock %}
